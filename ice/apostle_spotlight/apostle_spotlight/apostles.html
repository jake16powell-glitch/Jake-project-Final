<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-color: #E8ECED;
        }
        main {
            background-image: url(images/christus.webp);
            width: 1fr;
            border: 30px solid black;
            border-radius: 30px;
            padding: 0 25%;
            display:grid;
        }
        .title {
            font-family: Arial, sans-serif;
            justify-content: center;  
            color: white;
        }
        .sub-title {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        #first {
            display: inline;
            margin: auto;
            text-align: center;
        }
        #q {
            margin: auto;
            padding: 0 300px;
        }
        .image {
            border: 10px solid white;
            border-radius: 50%;
            width: 150px;
            justify-content: center;
            grid-column: 1fr;
        }
        .image:hover{
            border: 10px solid black;
            border-radius: 50%;
            width: 150px;
            justify-content: center;
            grid-column: 1fr;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <main>
        <first-presidency id="first">
            <h1 class="title">First Presidency</h1>
            <img class="image" id="eyring" src="images/eyring.webp" alt="President Henry B Eyring">
            <img class="image" src="images/oaks.webp" alt="President Dallin H Oaks">
            <img class="image" src="images/christofferson.webp" alt="President D Todd Christofferson">
        </first-presidency>
        <q12 class="q">
            <h3 class="sub-title">Quorum of the Twelve Apostles</h3>
            <img class="image" src="images/holland.webp" alt="President Jeffrey R Holland">
            <img class="image" src="images/uchtdorf.webp" alt="uchtdorf">
            <img class="image" src="images/bednar.webp" alt="bednar">
            <img class="image" src="images/cook.webp" alt="cook">
            <img class="image" src="images/anderson.webp" alt="andersen">
            <img class="image" src="images/rasband.webp" alt="rasband">
            <img class="image" src= "images/stevenson.webp" alt="stevenson">
            <img class="image" src="images/renlund.webp" alt="renlund">
            <img class="image" src="images/gong.webp" alt="gong">
            <img class="image" src="images/soares.webp" alt="soares">
            <img class="image" src="images/kearon.webp" alt="kearon">
            <img class="image" src="images/causse.webp" alt="kearon">
        </q12>
     </main>
</body>
</html>
